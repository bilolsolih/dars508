services:
  backend:
    build: .
    container_name: uzchess-backend-n10
    restart: always
    command: >
      sh -c "node dist/main.js"
    ports:
      - "1234:8000"
    networks:
      - uzchess-n10
    depends_on:
      database:
        condition: service_healthy
  database:
    image: postgres:18-alpine
    container_name: uzchess-database-n10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123
      - POSTGRES_DB=dars507
    restart: always
    ports:
      - "5432:5432"
    networks:
      - uzchess-n10
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      retries: 5
      interval: 5s
      timeout: 5s
    volumes:
      - uzchess_n10:/var/lib/postgresql

networks:
  uzchess-n10:
    driver: bridge

volumes:
  uzchess_n10: